<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>weather app</title>
    </head>
    <body>
        <h1 id="name"></h1>
        <p id="weather">天気</p>
        <p id="temp">気温</p>
        <p id="humd">湿度</p>
        <p id="rain">降水量</p>
        <ul id="list"></ul>
        <script>
            const DOM = {
                name:document.getElementById("name"),
                weather:document.getElementById("weather"),
                temp:document.getElementById("temp"),
                humd:document.getElementById("humd"),
                rain:document.getElementById("rain"),
                list: document.getElementById("list")
            }
            function getLocation(){
                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(
                        position => resolve(position),
                        error => reject(error)
                    );
                });
            }
           async function main() {
                try{
                    const positionDate = await getLocation();
                    const lat = positionDate.coords.latitude;
                    const lng = positionDate.coords.longitude;
                    console.log(lat,lng);
                    DOM.name.textContent = "位置情報取得中・・・";
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
                    const result = await response.json();
                    console.log(result);
                    DOM.name.textContent = (result.address.town || result.address.city || "現在位置") + "の天気予報";
                    const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weathercode,precipitation,relativehumidity_2m&hourly=temperature_2m,weathercode,precipitation`);
                    const weatherResult = await weatherResponse.json();
                    console.log(weatherResult);
                    const current = weatherResult.current;//別にいらない変数に入れなくてもweatherResult.currentこれを前に書けばいい
                    const weatherDate = getweather(current.weathercode);
                    DOM.weather.textContent = "天気" + weatherDate;
                    DOM.temp.textContent = "気温" + current.temperature_2m + "℃";
                    DOM.humd.textContent = "湿度" + current.relativehumidity_2m + "%";
                    DOM.rain.textContent = "降水量" + current.precipitation + "mm"; 
                    const hourly = weatherResult.hourly;
                    hourly.time.forEach((item,i)=> {
                        const li = document.createElement("li")
                        const temp = hourly.temperature_2m[i];
                        const code = hourly.weathercode[i];
                        const weather = getweather(code);
                        li.textContent = item + " : " + temp + "℃ " + weather;
                        DOM.list.appendChild(li);
                    });
                }catch(error){
                    console.log("失敗",error);
                    alert("位置情報の取得に失敗しました。");
                }
           }
           main();
           function getweather(code){
                if(code === 0)return"快晴";
                if(1 <= code && code <= 3)return"晴れ";
                if(code === 48 || code === 45)return"霧";
                if(code === 51 || code === 53 || code === 55)return"霧雨";
                if(code === 61 || code === 63 || code === 65)return"雨";
                if(code === 71 || code === 73 || code === 75)return"雪";
                if(code === 80 || code === 81 || code === 82)return"にわか雨";
                if(code === 95)return"雷雨";
            }
        </script>
    </body>
