<html>
    <head>
        <meta charset="UTF-8">
        <title>practice</title>
    </head>
    <body>
        <input type="text" class="text">
        <input type="date" class="deadline">
        <button class="btn">追加</button>
        <button class="all">全て</button>
        <button class="comp">完了</button>
        <button class="incomp">未完了</button>
        <button class="all_delt">完了タスク削除</button>
        <ul class="list"></ul>
        <div class="counter">
            <p class="total"></p>
            <p class="compNum"></p>
            <p class="incompNum"></p>
        </div>
        <input type="text" class="search" placeholder="検索">
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    </body>
    <script>
          const text = document.querySelector(".text");
        const btn = document.querySelector(".btn");
        const allBtn = document.querySelector(".all");
        const compBtn = document.querySelector(".comp");
        const deltBtn = document.querySelector(".incomp");
        const list = document.querySelector(".list");
        const counter = document.querySelector(".counter");
        const total = document.querySelector(".total");
        const completeNum = document.querySelector(".compNum");
        const incompleteNum = document.querySelector(".incompNum");
        const all_delt = document.querySelector(".all_delt");
        const search = document.querySelector(".search");
        const deadline = document.querySelector(".deadline");
        let todos = [];
        let filter = "all";
        function savedTodos(){
            localStorage.setItem("todos",JSON.stringify(todos));
        }
        function loadTodos(){
            const saved = localStorage.getItem("todos");
            if(saved){
                todos = JSON.parse(saved);
            }
        }
        function addTask(){
            if(text.value.trim() === "")return;
            todos.push({
                id: Date.now(),
                text: text.value,
                done: false,
                deadline: deadline.value
            });
            text.value = "";
            deadline.value = "";
            savedTodos();
            renderTodos();

        }
        function creatTodoElement(todo){
                const li = document.createElement("li");
                const span = document.createElement("span");
                const comp_btn = document.createElement("button");
                const delt_btn = document.createElement("button");
                const change_btn = document.createElement("button");
                span.textContent = todo.text + "("+todo.deadline+")";
                li.dataset.id = todo.id;
                if(todo.done){
                    comp_btn.textContent = "未完了";
                }else{
                    comp_btn.textContent = "完了";
                }
                delt_btn.textContent = "削除";
                change_btn.textContent = "編集";
                comp_btn.classList.add("complete");
                delt_btn.classList.add("delete");
                change_btn.classList.add("change");
                if(todo.done){
                    li.classList.add("done");
                }
                li.appendChild(span);
                li.appendChild(comp_btn);
                li.appendChild(delt_btn);
                li.appendChild(change_btn);
                return li;

        }
        function renderTodos(){
            list.innerHTML = "";
            const searchWord = search.value;
            const today = new Date().toISOString().split("T")[0];
            todos.forEach(function(todo){
                const li = creatTodoElement(todo);
                if(todo.deadline && todo.deadline < today){
                li.style.color = "red"
            }
                if(!todo.text.includes(searchWord)){
                    return;
                }
                if(filter === "complete" && !todo.done){
                    return;
                }
                if(filter === "incomplete" && todo.done){
                    return;
                }
                list.appendChild(li);

            });
            updateCount();
        }
        function updateCount(){
            const total_Num = todos.length;
            let comp_Num = 0;
            let incomp_Num = 0;
            todos.forEach(function(todo){
                if(todo.done){
                    comp_Num++
                }else{
                    incomp_Num++
                }
            });
            total.textContent = "全体"+ total_Num;
            completeNum.textContent = "完了"+comp_Num;
            incompleteNum.textContent = "未完了"+incomp_Num
        }
        text.addEventListener("keydown",function(e){
            if(e.key ==="Enter"){
                addTask();
            }
        });
        window.addEventListener("DOMContentLoaded",function(){
            loadTodos();
            renderTodos();
            new Sortable(list,{
                animation: 150,
                onEnd:function(e){
                    const movedItem = todos.splice(e.oldIndex,1)[0];
                    todos.splice(e.newIndex,0,movedItem);
                    savedTodos();
                    renderTodos();
                    }
                 });
            });
        search.addEventListener("input",function(){
            renderTodos();
        });
        btn.addEventListener("click",addTask);
        list.addEventListener("click",function(e){
            if(e.target.classList.contains("complete")){
                const li = e.target.parentElement;
                const id = Number(li.dataset.id);
                const todo = todos.find(function(todo){
                    return todo.id === id;
                });
                todo.done = !todo.done;
                savedTodos();
                renderTodos();
            }
            if(e.target.classList.contains("delete")){
                const li = e.target.parentElement;
                const id = Number(li.dataset.id);
                todos = todos.filter(function(todo){
                    return todo.id !== id;
                });
                savedTodos();
                renderTodos();
            }
            if(e.target.classList.contains("change")){
                const li = e.target.parentElement
                const id = Number(li.dataset.id);
                const newText = prompt("新しいテキストを入力してください");
                if(newText !== null && newText.trim() !==""){
                    const todo = todos.find(function(todo){
                        return todo.id === id;
                });
                todo.text = newText;
                savedTodos();
                renderTodos();
                }
        
            }
        });
        allBtn.addEventListener("click",function(){
            filter = "all"
            savedTodos();
            renderTodos();
        });
        compBtn.addEventListener("click",function(){
            filter = "complete"
            savedTodos();
            renderTodos();
        });
        deltBtn.addEventListener("click",function(){
            filter = "incomplete"
            savedTodos();
            renderTodos();
        });
        all_delt.addEventListener("click",function(){
            todos = todos.filter(function(todo){
                return !todo.done
            });
            savedTodos();
            renderTodos();
        });
    </script>
    <style>
        li.done span{
            text-decoration: line-through;
            color: aqua;
        }
    </style>
</html>
