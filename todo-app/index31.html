<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>practice</title>
    </head>
    <body>
        <input type="text" class="text">
        <button class="btn">追加</button>
        <button class="allBtn">すべて</button>
        <button class="compBtn">完了</button>
        <button class="deltBtn">未完了</button>
        <ul class="list"></ul>
        <div class="counter"></div>
    </body>
    <script>
        const text = document.querySelector(".text");
        const btn = document.querySelector(".btn");
        const allBtn = document.querySelector(".allBtn");
        const compBtn = document.querySelector(".compBtn");
        const deltBtn = document.querySelector(".deltBtn");
        const list = document.querySelector(".list");
        const counter = document.querySelector(".counter");
        let todos = [];
        function addTask(){
            if(text.value.trim() === "")return;
            todos.push({
                text: text.value,
                done: false
            });
            text.value = "";
            savedTodos();
            renderTodos();
            uppdateCount();

        }
        function savedTodos(){
            localStorage.setItem("todos",JSON.stringify(todos));
        }
        function loadTodos(){
            const saved = localStorage.getItem("todos");
            if(saved){
                todos = JSON.parse(saved);
            }
        }
        function renderTodos(){
            list.innerHTML = "";
            todos.forEach(function(todo,index){
                const li = document.createElement("li");
                const span = document.createElement("span");
                const comp_btn = document.createElement("button");
                const delete_btn = document.createElement("button");
                const change_btn = document.createElement("button");
                span.textContent = todo.text.toUpperCase();
                comp_btn.classList.add("complete");
                delete_btn.classList.add("delete");
                change_btn.classList.add("change")
                comp_btn.textContent = "完了";
                delete_btn.textContent = "削除";
                change_btn.textContent = "編集";
                li.dataset.index = index;
                if(todo.done){
                    li.classList.add("done");
                }
                li.appendChild(span);
                li.appendChild(comp_btn);
                li.appendChild(delete_btn);
                li.appendChild(change_btn);
                list.appendChild(li);
               
            });
            uppdateCount();
    
        }
        function uppdateCount(){
            let num = 0;
            todos.forEach(function(todo){
                if(!todo.done){//falseの時カウント
                    num++
                }
            });
            counter.textContent = "未完了タスク"+num
        }
        btn.addEventListener("click",addTask);
        text.addEventListener("keydown",function(e){
            if(e.key === "Enter"){
                addTask();
            }
        });
        window.addEventListener("DOMContentLoaded",function(){
            loadTodos();
            renderTodos();
        });
        list.addEventListener("click",function(e){
            if(e.target.tagName === "SPAN"){
                if(e.target.textContent === e.target.textContent.toUpperCase()){
                e.target.textContent = e.target.textContent.toLowerCase(); 
            }else{
                e.target.textContent = e.target.textContent.toUpperCase();
            }
        }
        if(e.target.classList.contains("complete")){
            const li = e.target.parentElement;
            const index = li.dataset.index;
            const isDone = li.classList.toggle("done");
            todos[index].done = isDone;
            if(isDone){
                e.target.textContent = "未完了";
            }else{
                e.target.textContent = "完了";
            }
            savedTodos();
            renderTodos();
        }
        if(e.target.classList.contains("delete")){
            const li = e.target.parentElement;
            const index = li.dataset.index;
            todos.splice(index,1);
            savedTodos();
            renderTodos();

        }
        if(e.target.classList.contains("change")){ 
            const li = e.target.parentElement
            const index = li.dataset.index
            const newText = prompt("新しいテキストを入力してください");
            if(newText !== null && newText.trim()!==""){
                todos[index].text = newText.trim();
            savedTodos();
            renderTodos();
            }
           
        }  
    });
    allBtn.addEventListener("click",function(){
        const items = document.querySelectorAll("li");
        items.forEach(function(item){
            item.style.display = ""
        });
    });
    compBtn.addEventListener("click",function(){
        const items = document.querySelectorAll("li");
        items.forEach(function(item){
            if(item.classList.contains("done")){
                item.style.display = ""
            }else{
                item.style.display = "none"
            }
        });
    });
    deltBtn.addEventListener("click",function(){
        const items = document.querySelectorAll("li");
        items.forEach(function(item){
            if(!item.classList.contains("done")){
                item.style.display = ""
            }else{
                item.style.display = "none"
            }
        });
    });
</script>
<style>
    li.done span{
        text-decoration: line-through;
        color: aqua;
    }
</style>
</html>
